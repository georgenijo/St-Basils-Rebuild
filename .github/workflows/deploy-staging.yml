name: Deploy to Staging

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # -----------------------------------------
      # Node.js steps (commented out). Uncomment if needed.
      #
      # - name: Set up Node.js
      #   uses: actions/setup-node@v3
      #   with:
      #     node-version: '16'
      #
      # - name: Install dependencies
      #   run: |
      #     if [ -f package.json ]; then
      #       npm ci
      #     fi
      #
      # - name: Build
      #   run: |
      #     if [ -f package.json ] && jq -e '.scripts.build' package.json > /dev/null; then
      #       npm run build
      #     fi
      # -----------------------------------------

      - name: Deploy to Staging
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          # If staging has unique FTP credentials, set them as secrets:
          # server: ${{ secrets.STAGING_FTP_SERVER }}
          # username: ${{ secrets.STAGING_FTP_USERNAME }}
          # password: ${{ secrets.STAGING_FTP_PASSWORD }}

          # Otherwise, if your main credentials can also access staging:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}

          # Change local-dir if your site is built into a subfolder (e.g., ./build)
          local-dir: ./
          # Adjust server-dir to the actual folder for staging on GoDaddy
          server-dir: /preprod.stbasilsboston.org/

          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            README.md
            .github/**
