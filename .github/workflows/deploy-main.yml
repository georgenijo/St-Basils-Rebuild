name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # -----------------------------------------
      # Node.js steps (commented out). Uncomment if needed.
      #
      # - name: Set up Node.js
      #   uses: actions/setup-node@v3
      #   with:
      #     node-version: '16'
      #
      # - name: Install dependencies
      #   run: |
      #     if [ -f package.json ]; then
      #       npm ci
      #     fi
      #
      # - name: Build
      #   run: |
      #     if [ -f package.json ] && jq -e '.scripts.build' package.json > /dev/null; then
      #       npm run build
      #     fi
      # -----------------------------------------

      - name: Deploy to Production
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          # Production FTP secrets
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}

          # Adjust local-dir if your built files are in ./build
          local-dir: ./
          # The production folder on GoDaddy
          server-dir: /new_website/root/

          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            README.md
            .github/**
