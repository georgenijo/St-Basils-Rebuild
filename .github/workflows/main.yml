name: Deploy Website

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1) Check out your repository
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2) (Optional) Set up Node.js environment
      #    Remove these steps if your site isn't using Node.js.
      # - name: Set up Node.js
      #   uses: actions/setup-node@v3
      #   with:
      #     node-version: '16'
      #     cache: 'npm'
      
      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci --only=production
          fi

      - name: Build
        run: |
          # This checks if there's a "build" script in package.json, then runs it.
          if [ -f package.json ] && jq -e '.scripts.build' package.json > /dev/null; then
            npm run build
          fi

      - name: Run tests
        run: |
          # This checks if there's a "test" script in package.json, then runs it.
          if [ -f package.json ] && jq -e '.scripts.test' package.json > /dev/null; then
            npm test
          fi

      # 3) Deploy to GoDaddy via FTP
      - name: Deploy to production
        # Only run if pushing to the main branch
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./                # Change if your built site is in a subfolder (e.g., ./build or ./dist)
          server-dir: /new_website/root/  # Adjust this to your actual GoDaddy document root
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            README.md
            .github/**
